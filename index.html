<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앵그리 테니스 클럽 대진표</title>
<style>
  :root {
    --men: #2563eb;
    --men-bg: #dbeafe;
    --women: #db2777;
    --women-bg: #fce7f3;
    --accent: #16a34a;
    --border: #d1d5db;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    margin: 0; padding: 16px; background: #f5f6f8; color: #1f2937;
    max-width: 860px; margin-left: auto; margin-right: auto;
  }
  h1 { font-size: 1.35rem; margin: 0 0 12px; }
  h2 { font-size: 1.02rem; margin: 0 0 10px; }
  section.card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
  .chip {
    border: 1.5px solid var(--border); border-radius: 999px; padding: 6px 13px;
    background: #fff; cursor: pointer; font-size: 0.95rem; user-select: none;
  }
  .chip.m.on { background: var(--men-bg); border-color: var(--men); color: var(--men); font-weight: 700; }
  .chip.w.on { background: var(--women-bg); border-color: var(--women); color: var(--women); font-weight: 700; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .detail-table th, .detail-table td { border-bottom: 1px solid #eee; padding: 5px 6px; text-align: center; }
  .detail-table th { color: var(--muted); font-weight: 600; }
  .detail-table td:first-child { font-weight: 700; }
  .xr {
    display: inline-block; width: 24px; height: 24px; line-height: 22px; text-align: center;
    border: 1px solid var(--border); border-radius: 5px; cursor: pointer; margin: 0 1.5px; font-size: 0.8rem;
    background: #fff; user-select: none;
  }
  .xr.on { background: #fee2e2; border-color: #dc2626; color: #dc2626; font-weight: 700; }
  button.primary {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 22px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  button.ghost {
    background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 9px 16px; font-size: 0.95rem; cursor: pointer;
  }
  .banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 0.9rem; }
  .banner.error { background: #fee2e2; border: 1px solid #dc2626; color: #991b1b; }
  .banner.warn { background: #fef3c7; border: 1px solid #d97706; color: #92400e; }
  .banner.info { background: #e0f2fe; border: 1px solid #0284c7; color: #075985; }
  .banner ul { margin: 4px 0 0 18px; padding: 0; }
  table.bracket { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
  table.bracket th, table.bracket td { border: 1px solid var(--border); padding: 7px 8px; font-size: 0.92rem; }
  table.bracket th { background: #f3f4f6; }
  td.roundcell { text-align: center; font-weight: 800; background: #f9fafb; width: 52px; }
  .gtype { display: inline-block; font-size: 0.72rem; border-radius: 4px; padding: 1px 6px; margin-right: 6px; vertical-align: 1px; font-weight: 700; }
  .gtype.MM { background: var(--men-bg); color: var(--men); }
  .gtype.WW { background: var(--women-bg); color: var(--women); }
  .gtype.MX { background: #ede9fe; color: #7c3aed; }
  .tok {
    display: inline-block; padding: 3px 9px; border-radius: 6px; margin: 1px;
    cursor: pointer; font-weight: 700; font-size: 0.92rem; border: 1.5px solid transparent; user-select: none;
  }
  .tok.m { background: var(--men-bg); color: var(--men); }
  .tok.w { background: var(--women-bg); color: var(--women); }
  .tok.sel { border-color: #111; box-shadow: 0 0 0 2px #11182740; }
  .vs { color: var(--muted); font-weight: 700; margin: 0 6px; font-size: 0.85rem; }
  .diffbadge { float: right; color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
  .lessonlabel { color: var(--muted); font-size: 0.85rem; font-weight: 700; }
  .statline { font-size: 0.9rem; color: #374151; margin: 8px 0; }
  .preficon { font-size: 0.75rem; }
  .hint { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 0.9rem; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 50;
  }
  #toast.show { opacity: 0.94; }
  label.radio { margin-right: 14px; font-size: 0.95rem; }
  input[type="number"] { width: 64px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; }
  @media print {
    body { background: #fff; padding: 0; max-width: none; }
    .no-print { display: none !important; }
    section.card { border: 0; padding: 4px 0; margin: 0; }
    table.bracket th, table.bracket td { padding: 5px 6px; }
    .tok { cursor: default; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
