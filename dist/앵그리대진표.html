<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앵그리 테니스 클럽 대진표</title>
<style>
  :root {
    --men: #2563eb;
    --men-bg: #dbeafe;
    --women: #db2777;
    --women-bg: #fce7f3;
    --accent: #16a34a;
    --border: #d1d5db;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    margin: 0; padding: 16px; background: #f5f6f8; color: #1f2937;
    max-width: 1080px; margin-left: auto; margin-right: auto;
  }
  h1 { font-size: 1.35rem; margin: 0 0 12px; }
  h2 { font-size: 1.02rem; margin: 0 0 10px; }
  section.card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
  .chip {
    border: 1.5px solid var(--border); border-radius: 999px; padding: 6px 13px;
    background: #fff; cursor: pointer; font-size: 0.95rem; user-select: none;
  }
  .chip.m.on { background: var(--men-bg); border-color: var(--men); color: var(--men); font-weight: 700; }
  .chip.w.on { background: var(--women-bg); border-color: var(--women); color: var(--women); font-weight: 700; }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .detail-table th, .detail-table td { border-bottom: 1px solid #eee; padding: 5px 6px; text-align: center; }
  .detail-table th { color: var(--muted); font-weight: 600; }
  .detail-table td:first-child { font-weight: 700; }
  .xr {
    display: inline-block; width: 24px; height: 24px; line-height: 22px; text-align: center;
    border: 1px solid var(--border); border-radius: 5px; cursor: pointer; margin: 0 1.5px; font-size: 0.8rem;
    background: #fff; user-select: none;
  }
  .xr.on { background: #fee2e2; border-color: #dc2626; color: #dc2626; font-weight: 700; }
  button.primary {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 10px 22px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  button.ghost {
    background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 9px 16px; font-size: 0.95rem; cursor: pointer;
  }
  .banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 0.9rem; }
  .banner.error { background: #fee2e2; border: 1px solid #dc2626; color: #991b1b; }
  .banner.warn { background: #fef3c7; border: 1px solid #d97706; color: #92400e; }
  .banner.info { background: #e0f2fe; border: 1px solid #0284c7; color: #075985; }
  .banner ul { margin: 4px 0 0 18px; padding: 0; }
  .bracket-scroll { overflow-x: auto; }
  table.bracket { width: auto; border-collapse: collapse; margin: 0 auto 6px; } /* 카드 가운데 정렬 */
  table.bracket th, table.bracket td { border: 1px solid var(--border); padding: 7px 10px; font-size: 0.92rem; }
  table.bracket th { background: #f3f4f6; }
  .tline { white-space: nowrap; } /* 게임은 팀별 두 줄 — 컬럼이 내용 폭에 맞게 줄어듦 */
  .tline + .tline { margin-top: 3px; }
  .lessonbox { max-width: 300px; }
  td.emptycourt { text-align: center; color: #c7cdd6; }
  td.gamecell { position: relative; }
  .cellbadges { position: absolute; top: 1px; right: 3px; font-size: 0.72rem; letter-spacing: 1px; }
  .vbadge { font-size: 0.68rem; margin-left: 1px; }
  .badge-legend { font-size: 0.8rem; color: var(--muted); margin: 4px 0 8px; text-align: center; }
  td.roundcell { text-align: center; font-weight: 800; background: #f9fafb; width: 52px; }
  /* 대진표 이름은 무채색 — 성별 색은 파트너 중복 강조에만 사용 */
  .tok {
    display: inline-block; padding: 3px 7px; border-radius: 6px; margin: 1px;
    cursor: pointer; font-weight: 600; font-size: 0.92rem; color: #111; user-select: none;
  }
  .tok.m { background: var(--men-bg); color: var(--men); font-weight: 700; }
  .tok.w { background: var(--women-bg); color: var(--women); font-weight: 700; }
  .vs { color: var(--muted); font-weight: 700; margin: 0 6px 0 1px; font-size: 0.85rem; }
  .vs.same { color: #111; }
  .vs.mx { color: #2563eb; }
  .vs.japbok { color: #ff1493; }
  .result-cols { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; justify-content: center; }
  .bracket-col { flex: 1 1 auto; min-width: 0; max-width: 100%; }
  .note-side { flex: 0 1 320px; min-width: 250px; }
  .note-side .banner { margin-bottom: 0; }

  /* 명단 관리 */
  .secsum { cursor: pointer; font-size: 0.95rem; }
  .hint-inline { font-weight: 400; color: var(--muted); font-size: 0.82rem; }
  .rwrap { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
  .rcol { flex: 1 1 300px; min-width: 280px; }
  .rcol-head { font-weight: 700; margin-bottom: 6px; }
  .mcol .rcol-head { color: var(--men); }
  .wcol .rcol-head { color: var(--women); }
  .cnt { font-weight: 400; color: var(--muted); font-size: 0.82rem; }
  .rrow {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    border: 1px solid #eee; border-radius: 7px; margin-bottom: 4px; background: #fafafa;
  }
  .rrow.dragover { border-color: var(--accent); background: #ecfdf5; }
  .dragh { cursor: grab; color: #9ca3af; font-size: 1.05rem; padding: 0 2px; user-select: none; }
  .rank { width: 22px; text-align: center; font-weight: 800; color: var(--muted); font-size: 0.85rem; }
  .rname { font-weight: 700; cursor: pointer; flex: 1; min-width: 60px; }
  .mcol .rname { color: var(--men); }
  .wcol .rname { color: var(--women); }
  .name-edit { flex: 1; min-width: 60px; padding: 3px 6px; border: 1.5px solid var(--accent); border-radius: 5px; font-size: 0.9rem; font-weight: 700; }
  .guestb { font-size: 0.68rem; background: #fef9c3; color: #a16207; border-radius: 4px; padding: 1px 5px; font-weight: 700; }
  .traits { display: flex; gap: 2px; }
  .tbtn {
    cursor: pointer; font-size: 0.85rem; padding: 1px 3px; border-radius: 5px;
    filter: grayscale(1); opacity: 0.4; user-select: none;
  }
  .tbtn.on { filter: none; opacity: 1; background: #f0fdf4; }
  .updown { display: flex; flex-direction: column; gap: 1px; }
  .mini {
    border: 1px solid var(--border); background: #fff; border-radius: 4px;
    font-size: 0.6rem; padding: 0 4px; cursor: pointer; line-height: 1.3;
  }
  .mini:disabled { opacity: 0.3; cursor: default; }
  .mini.del { font-size: 0.85rem; color: #dc2626; padding: 1px 7px; line-height: 1.5; }
  .addrow { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
  .addrow input[type="text"] { flex: 1; min-width: 80px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; }
  .gchk { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .mini2 { padding: 6px 10px; font-size: 0.85rem; white-space: nowrap; }

  /* 고급 설정 */
  .advgrid { display: grid; grid-template-columns: auto 1fr; gap: 8px 14px; align-items: center; margin-top: 10px; font-size: 0.92rem; }
  .advgrid .hint { margin: 0; }
  .advgrid select { padding: 4px 6px; border: 1px solid var(--border); border-radius: 6px; }

  /* 버전 히스토리 */
  .vrow { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .vchip {
    border: 1.5px solid var(--border); border-radius: 999px; padding: 3px 11px;
    font-size: 0.82rem; cursor: pointer; background: #fff; user-select: none;
  }
  .vchip.on { border-color: var(--accent); background: #ecfdf5; color: #166534; font-weight: 700; }
  .lessonlabel { color: var(--muted); font-size: 0.85rem; font-weight: 700; }
  .statline { font-size: 0.9rem; color: #374151; margin: 8px 0; }
  .preficon { font-size: 0.75rem; }
  .hint { color: var(--muted); font-size: 0.82rem; margin-top: 6px; }
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 0.9rem; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 50;
  }
  #toast.show { opacity: 0.94; }
  label.radio { margin-right: 14px; font-size: 0.95rem; }
  input[type="number"] { width: 64px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; }
  @media print {
    body { background: #fff; padding: 0; max-width: none; }
    .no-print { display: none !important; }
    section.card { border: 0; padding: 4px 0; margin: 0; }
    table.bracket th, table.bracket td { padding: 5px 6px; }
    .tok { cursor: default; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';
// ─── engine/rng.js ───
// 시드 가능한 PRNG (mulberry32) — 같은 시드면 항상 같은 대진표가 나와 재현 가능하다.
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeRng(seed) {
  const next = mulberry32(seed);
  return {
    next,
    int(n) {
      return Math.floor(next() * n);
    },
    pick(arr) {
      return arr[Math.floor(next() * arr.length)];
    },
    shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(next() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    },
    jitter(scale = 1) {
      return (next() - 0.5) * scale;
    },
  };
}

// ─── engine/validate.js ───
// 스케줄 검증기 — 엔진 자기검증, 비용 계산, UI 수동편집 경고가 모두 이 모듈을 공유한다.

function pairKey(a, b) {
  return a < b ? a + '|' + b : b + '|' + a;
}

function teamGenderType(team, byId) {
  const g = team.map((id) => byId.get(id).gender).sort().join('');
  if (g === 'MM') return 'MM';
  if (g === 'WW') return 'WW';
  return 'MW';
}

// 스케줄 전체를 한 번 훑어 통계를 만든다. (비용 함수와 검증기가 함께 사용)
function computeStats(schedule, plan) {
  const byId = plan.byId;
  const R = schedule.rounds.length;

  const per = new Map();
  for (const p of plan.players) {
    per.set(p.id, { games: 0, sits: 0, mixed: 0, sitRounds: [], gameRounds: [] });
  }

  const partnerCount = new Map();
  const meetCount = new Map();
  const structural = [];
  const gameDiffs = [];
  let scoreDiffSum = 0;
  const opt = plan.options || {};
  const tightK = opt.tightRounds || 0;
  let earlyTightness = 0; // 빡겜 라운드의 게임 내 실력 폭 합

  schedule.rounds.forEach((rd, r) => {
    const seen = new Map(); // id → 배정 횟수 (라운드 내 중복 감지)
    const mark = (id, where) => {
      if (!byId.has(id)) {
        structural.push({ code: 'E_UNKNOWN_PLAYER', round: r, message: `${r + 1}라운드에 알 수 없는 선수(${id})가 있습니다.` });
        return;
      }
      seen.set(id, (seen.get(id) || 0) + 1);
      const p = byId.get(id);
      if (p.unavailable.has(r)) {
        structural.push({ code: 'E_EXCLUDED_ASSIGNED', round: r, players: [id], message: `${r + 1}라운드에서 제외된 ${p.label}이(가) ${where}에 배정되었습니다.` });
      }
    };

    for (const game of rd.games) {
      const [t1, t2] = game.teams;
      const all = [...t1, ...t2];
      if (all.length !== 4 || new Set(all).size !== 4) {
        structural.push({ code: 'E_BAD_GAME', round: r, message: `${r + 1}라운드 ${game.court}코트 게임 구성이 잘못되었습니다(4인 미충족).` });
        continue;
      }
      all.forEach((id) => mark(id, `${game.court}코트`));
      if (!all.every((id) => byId.has(id))) continue;

      const type1 = teamGenderType(t1, byId);
      const type2 = teamGenderType(t2, byId);
      if (type1 !== type2) {
        structural.push({ code: 'E_JAPBOK', round: r, players: all, message: `${r + 1}라운드 ${game.court}코트가 잡복(${type1} vs ${type2})입니다.` });
      }
      const actualType = type1 === type2 ? (type1 === 'MW' ? 'MX' : type1) : null;

      for (const id of all) {
        const s = per.get(id);
        s.games++;
        s.gameRounds.push(r);
        if (actualType === 'MX') s.mixed++;
      }
      for (const team of [t1, t2]) {
        const k = pairKey(team[0], team[1]);
        partnerCount.set(k, (partnerCount.get(k) || 0) + 1);
      }
      for (const x of t1) for (const y of t2) {
        const k = pairKey(x, y);
        meetCount.set(k, (meetCount.get(k) || 0) + 1);
      }
      const sum = (team) => team.reduce((acc, id) => acc + byId.get(id).score, 0);
      const diff = Math.abs(sum(t1) - sum(t2));
      gameDiffs.push({ round: r, court: game.court, diff });
      scoreDiffSum += diff;
      if (r < tightK) {
        // 남녀 순위는 절대 실력이 다르므로 실력 폭은 성별 내에서만 계산
        for (const g of ['M', 'W']) {
          const scores = all.filter((id) => byId.get(id).gender === g).map((id) => byId.get(id).score);
          if (scores.length > 1) earlyTightness += Math.max(...scores) - Math.min(...scores);
        }
      }
    }

    for (const id of rd.lesson) {
      mark(id, '레슨/대기');
      if (byId.has(id)) {
        const s = per.get(id);
        s.sits++;
        s.sitRounds.push(r);
      }
    }

    for (const [id, cnt] of seen) {
      if (cnt > 1) {
        structural.push({ code: 'E_DUP_ASSIGN', round: r, players: [id], message: `${r + 1}라운드에 ${byId.get(id).label}이(가) ${cnt}번 배정되었습니다.` });
      }
    }

    // 배정 누락: 가용 인원인데 게임에도 레슨/대기에도 없음
    for (const p of plan.players) {
      if (!p.unavailable.has(r) && !seen.has(p.id)) {
        structural.push({ code: 'E_UNASSIGNED', round: r, players: [p.id], message: `${r + 1}라운드에서 ${p.label}이(가) 게임에도 레슨/대기에도 배정되지 않았습니다.` });
      }
    }
  });

  // 파트너 중복
  let partnerRepeats = 0;
  const repeatedPartners = [];
  for (const [k, cnt] of partnerCount) {
    if (cnt > 1) {
      partnerRepeats += cnt - 1;
      repeatedPartners.push({ pair: k.split('|'), count: cnt });
    }
  }

  // 상대 중복
  let opponentPenalty = 0;
  let maxMeet = 0;
  const frequentOpponents = [];
  for (const [k, cnt] of meetCount) {
    if (cnt > maxMeet) maxMeet = cnt;
    if (cnt > 1) {
      opponentPenalty += (cnt - 1) * (cnt - 1);
      frequentOpponents.push({ pair: k.split('|'), count: cnt });
    }
  }

  // 연속 결장(레슨/대기)
  let consecutiveSits = 0;
  const consecutiveSitList = [];
  for (const p of plan.players) {
    const rounds = per.get(p.id).sitRounds;
    for (let i = 1; i < rounds.length; i++) {
      if (rounds[i] === rounds[i - 1] + 1) {
        consecutiveSits++;
        consecutiveSitList.push({ id: p.id, rounds: [rounds[i - 1], rounds[i]] });
      }
    }
  }

  // 게임 수 편차: 가용 라운드 수가 같은 그룹 내에서 max−min ≤ 1이 목표
  const groups = new Map();
  for (const p of plan.players) {
    let availCount = 0;
    for (let r = 0; r < R; r++) if (!p.unavailable.has(r)) availCount++;
    if (!groups.has(availCount)) groups.set(availCount, []);
    groups.get(availCount).push(p.id);
  }
  let spreadPenalty = 0;
  const spreadDetails = [];
  for (const [availCount, ids] of groups) {
    if (ids.length < 2) continue;
    const counts = ids.map((id) => per.get(id).games);
    const mx = Math.max(...counts);
    const mn = Math.min(...counts);
    if (mx - mn > 1) {
      spreadPenalty += mx - mn - 1;
      spreadDetails.push({ availCount, max: mx, min: mn, ids });
    }
  }

  // 레슨 로테이션(정기): 3라운드 내 전원 1회 레슨.
  // 결장 슬롯의 성별 구성은 게임 유형 규칙이 결정하므로, 성별별 실제 슬롯 대비 미달성분만 벌점.
  let rotationMiss = 0;
  let rotationMissedIds = [];
  if (schedule.type === 'regular' && R >= 3) {
    for (const g of ['M', 'W']) {
      const members = plan.players.filter((p) => p.gender === g && [0, 1, 2].some((r) => !p.unavailable.has(r)));
      if (!members.length) continue;
      const sitSlots = schedule.rounds
        .slice(0, 3)
        .reduce((acc, rd) => acc + rd.lesson.filter((id) => byId.has(id) && byId.get(id).gender === g).length, 0);
      const missed = members.filter((p) => !per.get(p.id).sitRounds.some((r) => r < 3));
      const minMissed = Math.max(0, members.length - sitSlots);
      const penalty = Math.max(0, missed.length - minMissed);
      rotationMiss += penalty;
      if (penalty > 0) rotationMissedIds.push(...missed.map((p) => p.id));
    }
  }

  // 신규회원 레슨 미충족(정기, 레슨 슬롯이 있는 경우만)
  let newMemberLessonMiss = 0;
  if (schedule.type === 'regular') {
    const anyByes = schedule.rounds.some((rd) => rd.lesson.length > 0);
    if (anyByes) {
      for (const p of plan.players) {
        if (p.prefs.newMember && per.get(p.id).sits === 0) newMemberLessonMiss++;
      }
    }
  }

  // 월례: 인당 혼복 1회
  let mixedUncovered = 0;
  const mixedUncoveredIds = [];
  if (schedule.type === 'monthly' && plan.M > 0 && plan.W > 0) {
    for (const p of plan.players) {
      const s = per.get(p.id);
      if (s.games > 0 && s.mixed === 0) {
        mixedUncovered++;
        mixedUncoveredIds.push(p.id);
      }
    }
  }

  // 라운드별 유형 선호: 정기는 혼복 지정 라운드(설정, 기본 2·4)에서 혼복 우세,
  // 그 외 모든 라운드는 동성복식 우세(가중 2배)
  const mixedRounds = opt.mixedRounds || [2, 4];
  let typePrefCost = 0;
  schedule.rounds.forEach((rd, r) => {
    const c = rd.games.filter((g) => teamGenderType(g.teams[0], byId) === 'MW').length;
    const C = rd.games.length;
    if (schedule.type === 'regular' && mixedRounds.includes(r + 1)) typePrefCost += C - c;
    else if (schedule.type === 'regular') typePrefCost += c * 2;
    else typePrefCost += c;
  });

  // 레슨 그룹 실력 유사성(정기, 최하 우선순위)
  let lessonSkillSpread = 0;
  if (schedule.type === 'regular') {
    for (const rd of schedule.rounds) {
      if (rd.lesson.length >= 2) {
        const scores = rd.lesson.filter((id) => byId.has(id)).map((id) => byId.get(id).score);
        lessonSkillSpread += Math.max(...scores) - Math.min(...scores);
      }
    }
  }

  // 개인 특성(정기): 혼복선호자 혼복 미경험 + 신규회원 상위레벨 매칭 점수
  let traitPenalty = 0;
  if (schedule.type === 'regular') {
    for (const p of plan.players) {
      if (p.prefs.mixedPreferred && per.get(p.id).games > 0 && per.get(p.id).mixed === 0) traitPenalty += 5;
    }
  }
  for (const p of plan.players) {
    if (!p.prefs.newMember) continue;
    for (const rd of schedule.rounds) {
      for (const game of rd.games) {
        const all = [...game.teams[0], ...game.teams[1]];
        if (!all.includes(p.id)) continue;
        const others = all.filter((id) => id !== p.id && byId.has(id)).map((id) => byId.get(id).score);
        if (others.length) traitPenalty += Math.min(...others) * 0.1;
      }
    }
  }

  const scoreDiffSq = gameDiffs.reduce((a, g) => a + g.diff * g.diff, 0);

  // 게임 점수차 상한 위반 (설정된 경우)
  let diffCapViolations = 0;
  const diffCapList = [];
  if (opt.maxDiff != null) {
    for (const g of gameDiffs) {
      if (g.diff > opt.maxDiff) {
        diffCapViolations++;
        diffCapList.push(g);
      }
    }
  }

  // 같은 상대 상한 위반 (설정된 경우)
  let meetCapViolations = 0;
  const meetCapList = [];
  if (opt.maxMeet != null) {
    for (const [k, cnt] of meetCount) {
      if (cnt > opt.maxMeet) {
        meetCapViolations += cnt - opt.maxMeet;
        meetCapList.push({ pair: k.split('|'), count: cnt });
      }
    }
  }

  return {
    perPlayer: per,
    scoreDiffSq,
    earlyTightness,
    diffCapViolations,
    diffCapList,
    partnerCount,
    meetCount,
    structural,
    partnerRepeats,
    repeatedPartners,
    meetCapViolations,
    meetCapList,
    opponentPenalty,
    maxMeet,
    frequentOpponents,
    consecutiveSits,
    consecutiveSitList,
    spreadPenalty,
    spreadDetails,
    rotationMiss,
    rotationMissedIds,
    newMemberLessonMiss,
    mixedUncovered,
    mixedUncoveredIds,
    typePrefCost,
    lessonSkillSpread,
    traitPenalty,
    scoreDiffSum,
    scoreDiffAvg: gameDiffs.length ? scoreDiffSum / gameDiffs.length : 0,
    scoreDiffMax: gameDiffs.length ? Math.max(...gameDiffs.map((g) => g.diff)) : 0,
    gameDiffs,
  };
}

// 사람이 읽을 수 있는 오류/경고 목록. severity: 'error'(하드 위반) / 'warn'(소프트 미달)
function validateSchedule(schedule, plan) {
  const stats = computeStats(schedule, plan);
  const errors = [];
  const warnings = [];
  const byId = plan.byId;
  const label = (id) => (byId.has(id) ? byId.get(id).label : id);

  for (const s of stats.structural) errors.push({ code: s.code, message: s.message });

  for (const rp of stats.repeatedPartners) {
    errors.push({
      code: 'E_PARTNER_REPEAT',
      message: `${label(rp.pair[0])}·${label(rp.pair[1])} 파트너 조합이 ${rp.count}번 사용되었습니다.`,
    });
  }

  for (const cs of stats.consecutiveSitList) {
    warnings.push({
      code: 'W_CONSECUTIVE_SIT',
      message: `${label(cs.id)}이(가) ${cs.rounds[0] + 1}·${cs.rounds[1] + 1}라운드 연속으로 게임에 들어가지 못했습니다.`,
    });
  }

  for (const sd of stats.spreadDetails) {
    warnings.push({
      code: 'W_GAME_SPREAD',
      message: `게임 수 차이가 ${sd.max - sd.min}입니다 (최대 ${sd.max}게임, 최소 ${sd.min}게임).`,
    });
  }

  if (stats.rotationMiss > 0) {
    warnings.push({
      code: 'W_LESSON_ROTATION',
      message: `3라운드 내 레슨을 받지 못한 인원이 이론적 최소보다 ${stats.rotationMiss}명 많습니다 (${stats.rotationMissedIds.map(label).join(', ')}).`,
    });
  }

  if (stats.mixedUncovered > 0) {
    warnings.push({
      code: 'W_MIXED_UNCOVERED',
      message: `혼복 게임을 한 번도 하지 못한 인원: ${stats.mixedUncoveredIds.map(label).join(', ')}`,
    });
  }

  for (const g of stats.diffCapList) {
    warnings.push({
      code: 'W_DIFF_CAP',
      message: `${g.round + 1}라운드 ${g.court}코트의 점수차(${g.diff})가 설정된 상한(${plan.options.maxDiff})을 넘습니다.`,
    });
  }

  if (plan.options && plan.options.maxMeet != null) {
    for (const mc of stats.meetCapList) {
      warnings.push({
        code: 'W_MEET_CAP',
        message: `${label(mc.pair[0])}와(과) ${label(mc.pair[1])}이(가) 상대로 ${mc.count}번 만나 상한(${plan.options.maxMeet}번)을 넘습니다.`,
      });
    }
  } else {
    for (const fo of stats.frequentOpponents) {
      if (fo.count >= 3) {
        warnings.push({
          code: 'W_FREQUENT_OPPONENT',
          message: `${label(fo.pair[0])}와(과) ${label(fo.pair[1])}이(가) 상대로 ${fo.count}번 만납니다.`,
        });
      }
    }
  }

  return { errors, warnings, stats };
}

// ─── engine/planner.js ───
// Phase A: 설정 정규화, 라운드/코트 계획, 실현 가능성 사전 검사.

class SchedulerError extends Error {
  constructor(message, suggestions = []) {
    super(message);
    this.name = 'SchedulerError';
    this.suggestions = suggestions;
  }
}

const DEFAULT_OPTIONS = {
  maxDiff: null, // 게임 점수차 상한 (null = 제한 없음)
  maxMeet: 2, // 같은 상대와 만나는 횟수 상한 (null = 제한 없음)
  tightRounds: 3, // 초반 빡겜(비슷한 실력 4명 한 게임) 라운드 수
  mixedRounds: [2, 4], // 혼복 선호 라운드 (1-based, 정기모임 전용) — 그 외 라운드는 동성복식 선호
  allowConsecutiveSit: false, // 연속 결장 허용 (설정에 의한 강제 완화)
  allowPartnerRepeat: false, // 파트너 중복 허용 (설정에 의한 강제 완화)
  ignoreGender: false, // 성별 구분 없이 편성 (잡복 허용)
};

// 입력 형식: { id, name, gender:'M'|'W', score(성별 내 실력 순위, 1=최강),
//             prefs?: {gamePriority,newMember,mixedPreferred}, unavailableRounds?: [1-based...] }
function normalizePlayer(raw, ignoreGender) {
  const name = String(raw.name || '').trim();
  if (!name) throw new SchedulerError('이름이 비어 있는 참석자가 있습니다.');
  if (raw.gender !== 'M' && raw.gender !== 'W') {
    throw new SchedulerError(`${name}의 성별 정보가 잘못되었습니다.`);
  }
  const score = Number(raw.score);
  if (!Number.isFinite(score) || score < 1) {
    throw new SchedulerError(`${name}의 실력 순위(점수)가 잘못되었습니다: ${raw.score}`);
  }
  return {
    id: String(raw.id),
    gender: ignoreGender ? 'M' : raw.gender,
    realGender: raw.gender,
    score,
    label: name,
    prefs: {
      gamePriority: !!(raw.prefs && raw.prefs.gamePriority),
      newMember: !!(raw.prefs && raw.prefs.newMember),
      mixedPreferred: !!(raw.prefs && raw.prefs.mixedPreferred),
    },
    unavailable: new Set((raw.unavailableRounds || []).map((n) => n - 1)), // 내부는 0-based
  };
}

// 라운드에 유효한 (남복 a, 여복 b, 혼복 c) 구성이 존재하는지: m=4a+2c ≤ availM, w=4b+2c ≤ availW
function enumerateCompositions(courtCount, availM, availW) {
  const comps = [];
  for (let c = 0; c <= courtCount; c++) {
    for (let a = 0; a <= courtCount - c; a++) {
      const b = courtCount - c - a;
      const m = 4 * a + 2 * c;
      const w = 4 * b + 2 * c;
      if (m <= availM && w <= availW) comps.push({ a, b, c, m, w });
    }
  }
  return comps;
}

function buildPlan(config) {
  const type = config.type === 'monthly' ? 'monthly' : 'regular';
  const options = Object.assign({}, DEFAULT_OPTIONS, config.options || {});
  options.mixedRounds = Array.isArray(options.mixedRounds) ? options.mixedRounds.map(Number) : [2, 4];
  if (!Array.isArray(config.players) || config.players.length === 0) {
    throw new SchedulerError('참석자 목록이 비어 있습니다.');
  }

  const players = config.players.map((p) => normalizePlayer(p, options.ignoreGender));
  const ids = new Set(players.map((p) => p.id));
  if (ids.size !== players.length) throw new SchedulerError('참석자 id가 중복되었습니다.');

  const men = players.filter((p) => p.gender === 'M');
  const women = players.filter((p) => p.gender === 'W');
  const N = players.length;
  const M = men.length;
  const W = women.length;

  if (N < 5) {
    throw new SchedulerError(`참석 인원이 ${N}명입니다. 대진표 구성에는 최소 5명이 필요합니다.`);
  }
  if (N > 24) {
    throw new SchedulerError(`참석 인원이 ${N}명입니다. 현재 버전은 최대 24명까지 지원합니다.`);
  }
  if (M === 1) {
    throw new SchedulerError('남자가 1명이면 어떤 게임(남복 4명, 혼복 2명 필요)도 구성할 수 없습니다.', [
      '설정에서 "성별 구분 없이 편성"을 켜면 진행할 수 있습니다.',
      '또는 해당 남자 회원을 제외하거나 남자 인원을 2명 이상으로 조정하세요.',
    ]);
  }
  if (W === 1) {
    throw new SchedulerError('여자가 1명이면 어떤 게임(여복 4명, 혼복 2명 필요)도 구성할 수 없습니다.', [
      '설정에서 "성별 구분 없이 편성"을 켜면 진행할 수 있습니다.',
      '또는 해당 여자 회원을 제외하거나 여자 인원을 2명 이상으로 조정하세요.',
    ]);
  }

  // 라운드·코트 계획
  let R, courtsPerRound, extraGames = null, gamesPerPerson = null;
  const planWarnings = [];
  const maxCourts = type === 'regular' ? 2 : 3;

  if (type === 'regular') {
    R = Number(config.rounds) || 5;
    if (R < 1 || R > 12) throw new SchedulerError('라운드 수는 1~12 사이여야 합니다.');
    const C = Math.min(2, Math.floor(N / 4));
    courtsPerRound = Array(R).fill(C);
    if (C < 2) {
      planWarnings.push({
        code: 'W_COURT_REDUCED',
        message: `인원이 ${N}명이라 게임 코트를 ${C}개만 운영합니다 (코트당 4명 필요).`,
      });
    }
  } else {
    gamesPerPerson = Number(config.gamesPerPerson) || 4;
    if (gamesPerPerson < 1 || gamesPerPerson > 10) throw new SchedulerError('인당 게임 수는 1~10 사이여야 합니다.');
    const baseCourts = N >= 12 ? 3 : N >= 8 ? 2 : 1;
    const raw = N * gamesPerPerson;
    let T;
    if (raw % 4 === 0) {
      T = raw / 4;
    } else {
      const d = raw % 4;
      // 올림하면 (4−d)명이 +1게임, 내림하면 d명이 −1게임 — 편차 인원이 적은 쪽, 동률이면 +1 우선
      if (4 - d <= d) {
        T = Math.ceil(raw / 4);
        extraGames = { delta: +1, count: 4 - d };
      } else {
        T = Math.floor(raw / 4);
        extraGames = { delta: -1, count: d };
      }
      planWarnings.push({
        code: 'W_UNEVEN_GAMES',
        message: `${N}명 × ${gamesPerPerson}게임은 4로 나누어떨어지지 않아 ${extraGames.count}명이 ${gamesPerPerson + extraGames.delta}게임을 하게 됩니다.`,
      });
    }
    R = Math.ceil(T / baseCourts);
    // 앞 라운드는 풀코트로 채우고, 비는 코트는 마지막 라운드에 배치
    const q = Math.floor(T / R);
    const rem = T % R;
    courtsPerRound = Array.from({ length: R }, (_, i) => q + (i < rem ? 1 : 0));
  }

  // 라운드별 가용 인원·패리티 검사
  for (let r = 0; r < R; r++) {
    const avail = players.filter((p) => !p.unavailable.has(r));
    const availM = avail.filter((p) => p.gender === 'M').length;
    const availW = avail.length - availM;
    let C = courtsPerRound[r];
    if (avail.length < 4 * C) {
      const reduced = Math.floor(avail.length / 4);
      if (reduced < 1) {
        throw new SchedulerError(`${r + 1}라운드 가용 인원이 ${avail.length}명이라 게임을 구성할 수 없습니다.`, [
          '해당 라운드의 제외 인원을 줄이세요.',
        ]);
      }
      courtsPerRound[r] = reduced;
      C = reduced;
      planWarnings.push({
        code: 'W_ROUND_REDUCED',
        message: `${r + 1}라운드는 가용 인원 부족으로 ${reduced}개 코트만 운영합니다.`,
      });
    }
    if (enumerateCompositions(C, availM, availW).length === 0) {
      // 대표 원인: 대기 0명인데 남자(또는 여자)가 홀수 → 잡복 없이 불가능
      throw new SchedulerError(
        `${r + 1}라운드(가용 남${availM}/여${availW}, ${C}코트)에서 남복/여복/혼복만으로는 코트를 채울 수 없습니다.` +
          (avail.length === 4 * C && availM % 2 === 1 ? ' 전원 출전 라운드인데 남자 인원이 홀수라서 발생하는 문제입니다.' : ''),
        ['설정에서 "성별 구분 없이 편성"을 켜거나, 인원·제외 라운드를 조정하세요.']
      );
    }
  }

  // 파트너 풀 사전 경고: 어떤 선수의 목표 게임 수가 가능한 파트너 수를 넘으면 중복이 불가피
  const totalSlots = courtsPerRound.reduce((a, c) => a + 4 * c, 0);
  const targetGames = totalSlots / N;
  for (const p of players) {
    const partnerPool = p.gender === 'M' ? M - 1 + W : W - 1 + M;
    const myRounds = courtsPerRound.length - p.unavailable.size;
    const myTarget = Math.min(Math.ceil(targetGames), myRounds);
    if (myTarget > partnerPool) {
      planWarnings.push({
        code: 'W_PARTNER_POOL',
        message: `${p.label}의 예상 게임 수(${myTarget})가 가능한 파트너 수(${partnerPool})보다 많아 파트너 중복이 발생할 수 있습니다.`,
      });
    }
  }

  // 월례 혼복 커버리지 목표 (성별 무시 모드에서는 해당 없음)
  let mixedNeedTotal = 0;
  if (type === 'monthly' && M > 0 && W > 0) {
    mixedNeedTotal = Math.max(Math.ceil(M / 2), Math.ceil(W / 2));
  }

  return {
    type,
    options,
    players,
    byId: new Map(players.map((p) => [p.id, p])),
    men,
    women,
    N,
    M,
    W,
    R,
    courtsPerRound,
    totalGames: courtsPerRound.reduce((a, c) => a + c, 0),
    targetGames,
    gamesPerPerson,
    extraGames,
    mixedNeedTotal,
    planWarnings,
  };
}

// ─── engine/construct.js ───
// Phase B: 라운드별 구성 — 레슨(결장)자 선정 → 파트너 페어링(백트래킹) → 매치업.
// 하드 제약(1인 1게임, 잡복 금지, 파트너 중복 0)은 여기서 구조적으로 보장한다.



function constructSchedule(plan, rng, opts = {}) {
  const { allowPartnerRepeat = false, allowConsecutiveSit = false } = opts;
  const maxDiff = plan.options ? plan.options.maxDiff : null;
  const maxMeet = plan.options ? plan.options.maxMeet : null;
  const tightRounds = plan.options ? plan.options.tightRounds || 0 : 0;
  const mixedRounds = plan.options && plan.options.mixedRounds ? plan.options.mixedRounds : [2, 4];

  const games = new Map(); // id → 게임 수
  const sits = new Map(); // id → 결장(레슨/대기) 수
  const mixed = new Map(); // id → 혼복 수
  const lessoned = new Set(); // 한 번이라도 결장(=레슨)한 사람
  const partnersUsed = new Map(); // pairKey → 횟수
  const meets = new Map(); // pairKey → 상대로 만난 횟수
  let satPrev = new Set();
  for (const p of plan.players) {
    games.set(p.id, 0);
    sits.set(p.id, 0);
    mixed.set(p.id, 0);
  }

  const rounds = [];

  for (let r = 0; r < plan.R; r++) {
    const C = plan.courtsPerRound[r];
    const avail = plan.players.filter((p) => !p.unavailable.has(r));
    const excluded = plan.players.filter((p) => p.unavailable.has(r)).map((p) => p.id);
    const availM = avail.filter((p) => p.gender === 'M').sort((a, b) => a.score - b.score);
    const availW = avail.filter((p) => p.gender === 'W').sort((a, b) => a.score - b.score);
    const requiredIds = new Set(avail.filter((p) => satPrev.has(p.id)).map((p) => p.id));
    const reqM = availM.filter((p) => requiredIds.has(p.id)).length;
    const reqW = availW.filter((p) => requiredIds.has(p.id)).length;

    let comps = enumerateCompositions(C, availM.length, availW.length);
    if (comps.length === 0) return null;
    const fitting = comps.filter((cp) => cp.m >= reqM && cp.w >= reqW);
    if (fitting.length) comps = fitting;
    else if (!allowConsecutiveSit) return null;

    // 라운드 목표 혼복 수: 정기는 혼복 선호 라운드(설정, 기본 2·4)에서 최대, 그 외 최소. 월례는 커버리지 긴급도만큼.
    const cVals = comps.map((cp) => cp.c);
    const cMin = Math.min(...cVals);
    const cMax = Math.max(...cVals);
    const isMixedRound = plan.type === 'regular' && mixedRounds.includes(r + 1);
    let cTarget;
    if (plan.type === 'regular') {
      cTarget = isMixedRound ? cMax : cMin;
    } else {
      let urgency = 0;
      if (plan.M > 0 && plan.W > 0) {
        const uncovM = plan.men.filter((p) => mixed.get(p.id) === 0).length;
        const uncovW = plan.women.filter((p) => mixed.get(p.id) === 0).length;
        const needGames = Math.max(Math.ceil(uncovM / 2), Math.ceil(uncovW / 2));
        urgency = Math.ceil(needGames / (plan.R - r));
      }
      cTarget = Math.min(cMax, Math.max(cMin, urgency));
    }

    // 남녀 출전 배분 목표: 성별 잔여 게임 부족분(deficit)에 비례
    const deficit = (pool) =>
      pool.reduce((acc, p) => acc + Math.max(0.1, plan.targetGames - games.get(p.id)), 0);
    const defM = deficit(availM);
    const defW = deficit(availW);
    const idealM = (4 * C * defM) / (defM + defW || 1);

    // 성별 출전 균형(게임 수 균등, 4순위)이 유형 선호(10순위)보다 우선하도록 가중(40 미만).
    // 정기의 동성복식 선호 라운드(혼복 지정 외 전체)는 혼복 배제를 강하게 반영
    const typeWeight = plan.type === 'regular' && !isMixedRound ? 22 : 12;
    const ranked = comps
      .map((cp) => ({ cp, s: Math.abs(cp.m - idealM) * 40 + Math.abs(cp.c - cTarget) * typeWeight + rng.jitter(5) }))
      .sort((a, b) => a.s - b.s)
      .map((o) => o.cp);

    // 빡겜 라운드는 실력 인접 4명 청크 구성을 우선 시도, 실패 시 일반 구성으로 폴백
    const tight = r < tightRounds;
    let built = null;
    for (const comp of ranked) {
      if (tight) built = tryBuildRoundTight(comp);
      if (!built) built = tryBuildRound(comp);
      if (built) break;
    }
    if (!built) return null;

    // 커밋 — 게임 순서가 항상 남복→여복→혼복이라 남복이 a코트에 고정되는 것을 막기 위해
    // 라운드 인덱스만큼 회전시켜 코트 배정을 순환시킨다
    const courtLetters = ['a', 'b', 'c'];
    const rot = built.games.length > 1 ? r % built.games.length : 0;
    const orderedGames = [...built.games.slice(rot), ...built.games.slice(0, rot)];
    const roundGames = orderedGames.map((g, i) => ({
      court: courtLetters[i],
      type: g.type,
      teams: g.teams.map((team) => team.map((p) => p.id)),
      result: null,
    }));
    for (const g of built.games) {
      for (const team of g.teams) {
        const k = pairKey(team[0].id, team[1].id);
        partnersUsed.set(k, (partnersUsed.get(k) || 0) + 1);
      }
      for (const x of g.teams[0]) for (const y of g.teams[1]) {
        const k = pairKey(x.id, y.id);
        meets.set(k, (meets.get(k) || 0) + 1);
      }
      for (const p of [...g.teams[0], ...g.teams[1]]) {
        games.set(p.id, games.get(p.id) + 1);
        if (g.type === 'MX') mixed.set(p.id, mixed.get(p.id) + 1);
      }
    }
    for (const p of built.sitters) {
      sits.set(p.id, sits.get(p.id) + 1);
      lessoned.add(p.id);
    }
    satPrev = new Set(built.sitters.map((p) => p.id));
    rounds.push({
      games: roundGames,
      lesson: built.sitters.map((p) => p.id),
      excluded,
    });

    // ─── 라운드 내부 헬퍼 ───

    function tryBuildRound(comp) {
      // 1) 결장자(레슨/대기) 선정
      const sitM = pickSitters(availM, availM.length - comp.m);
      if (!sitM) return null;
      const sitW = pickSitters(availW, availW.length - comp.w);
      if (!sitW) return null;
      const sitIds = new Set([...sitM, ...sitW].map((p) => p.id));
      const playingM = availM.filter((p) => !sitIds.has(p.id));
      const playingW = availW.filter((p) => !sitIds.has(p.id));

      // 2) 혼복 인원 선발 + 페어링 (실패 시 혼복 인원을 바꿔 재시도)
      for (let attempt = 0; attempt < 4; attempt++) {
        const mxMen = pickTop(playingM, 2 * comp.c, mxScore);
        const mxWomen = pickTop(playingW, 2 * comp.c, mxScore);
        const mxMenIds = new Set(mxMen.map((p) => p.id));
        const mxWomenIds = new Set(mxWomen.map((p) => p.id));
        const mmPool = playingM.filter((p) => !mxMenIds.has(p.id));
        const wwPool = playingW.filter((p) => !mxWomenIds.has(p.id));

        const mmPairs = pairUpSame(mmPool);
        if (!mmPairs) continue;
        const wwPairs = pairUpSame(wwPool);
        if (!wwPairs) continue;
        const mxPairs = pairUpMixed(mxMen, mxWomen);
        if (!mxPairs) continue;

        // 3) 매치업 — 같은 유형의 페어끼리 게임으로 결합
        const mmGames = bestMatchup(mmPairs);
        const wwGames = bestMatchup(wwPairs);
        const mxGames = bestMatchup(mxPairs);
        if (!mmGames || !wwGames || !mxGames) continue;

        const gamesOut = [
          ...mmGames.map((t) => ({ type: 'MM', teams: t })),
          ...wwGames.map((t) => ({ type: 'WW', teams: t })),
          ...mxGames.map((t) => ({ type: 'MX', teams: t })),
        ];
        return { games: gamesOut, sitters: [...sitM, ...sitW] };
      }
      return null;
    }

    // 빡겜 구성: 실력순 인접 4명(혼복은 남2+여2)이 한 게임이 되도록 청크 분할
    function tryBuildRoundTight(comp) {
      const sitM = pickSitters(availM, availM.length - comp.m);
      if (!sitM) return null;
      const sitW = pickSitters(availW, availW.length - comp.w);
      if (!sitW) return null;
      const sitIds = new Set([...sitM, ...sitW].map((p) => p.id));
      const playingM = availM.filter((p) => !sitIds.has(p.id)).sort((a, b) => a.score - b.score);
      const playingW = availW.filter((p) => !sitIds.has(p.id)).sort((a, b) => a.score - b.score);

      const mmMen = playingM.slice(0, 4 * comp.a);
      const mxMen = playingM.slice(4 * comp.a);
      const wwWomen = playingW.slice(0, 4 * comp.b);
      const mxWomen = playingW.slice(4 * comp.b);

      const games = [];
      for (let i = 0; i < comp.a; i++) {
        const g = chunkGameSame(mmMen.slice(4 * i, 4 * i + 4), 'MM');
        if (!g) return null;
        games.push(g);
      }
      for (let i = 0; i < comp.b; i++) {
        const g = chunkGameSame(wwWomen.slice(4 * i, 4 * i + 4), 'WW');
        if (!g) return null;
        games.push(g);
      }
      for (let i = 0; i < comp.c; i++) {
        const g = chunkGameMixed(mxMen.slice(2 * i, 2 * i + 2), mxWomen.slice(2 * i, 2 * i + 2));
        if (!g) return null;
        games.push(g);
      }
      return { games, sitters: [...sitM, ...sitW] };
    }

    function pairFree(x, y) {
      return allowPartnerRepeat || !partnersUsed.has(pairKey(x.id, y.id));
    }

    // 실력순 4명 [s1,s2,s3,s4]의 팀 분할 — 합 균형이 좋은 순서(1·4 vs 2·3 우선)로 미사용 페어 조합 선택
    function chunkGameSame(four, type) {
      const splits = [
        [[0, 3], [1, 2]],
        [[0, 2], [1, 3]],
        [[0, 1], [2, 3]],
      ];
      let best = null;
      let bestDiff = Infinity;
      for (const [i1, i2] of splits) {
        const t1 = i1.map((i) => four[i]);
        const t2 = i2.map((i) => four[i]);
        if (!pairFree(t1[0], t1[1]) || !pairFree(t2[0], t2[1])) continue;
        const diff = Math.abs(t1[0].score + t1[1].score - t2[0].score - t2[1].score);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = { type, teams: [t1, t2] };
        }
      }
      return best;
    }

    function chunkGameMixed(men2, women2) {
      const splits = [
        [[men2[0], women2[1]], [men2[1], women2[0]]],
        [[men2[0], women2[0]], [men2[1], women2[1]]],
      ];
      let best = null;
      let bestDiff = Infinity;
      for (const [t1, t2] of splits) {
        if (!pairFree(t1[0], t1[1]) || !pairFree(t2[0], t2[1])) continue;
        const diff = Math.abs(t1[0].score + t1[1].score - t2[0].score - t2[1].score);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = { type: 'MX', teams: [t1, t2] };
        }
      }
      return best;
    }

    function pickSitters(pool, count) {
      if (count <= 0) return [];
      let cands = pool.filter((p) => !requiredIds.has(p.id));
      if (cands.length < count) {
        if (!allowConsecutiveSit) return null;
        const extra = pool
          .filter((p) => requiredIds.has(p.id))
          .sort((a, b) => sits.get(a.id) - sits.get(b.id) + rng.jitter(0.5));
        cands = cands.concat(extra);
      }
      return cands
        .map((p) => ({ p, s: sitScore(p) }))
        .sort((a, b) => b.s - a.s)
        .slice(0, count)
        .map((o) => o.p);
    }

    // 결장 우선순위: 게임 수 많음 > (정기 초반) 미레슨자 > 신규회원 레슨 특전 > 게임선호는 후순위
    function sitScore(p) {
      let s = games.get(p.id) * 100;
      if (plan.type === 'regular' && r < 3 && !lessoned.has(p.id)) s += 30;
      if (plan.type === 'regular' && p.prefs.newMember && sits.get(p.id) === 0) s += 20;
      if (p.prefs.gamePriority) s -= 35;
      s += rng.jitter(8);
      return s;
    }

    // 혼복 슬롯 우선순위: 월례는 혼복 미경험자, 정기는 혼복선호자
    function mxScore(p) {
      let s = 0;
      if (plan.type === 'monthly' && mixed.get(p.id) === 0) s += 50;
      if (plan.type === 'regular' && p.prefs.mixedPreferred) s += 50;
      s += rng.jitter(20);
      return s;
    }

    function pickTop(pool, count, scoreFn) {
      return pool
        .map((p) => ({ p, s: scoreFn(p) }))
        .sort((a, b) => b.s - a.s)
        .slice(0, count)
        .map((o) => o.p);
    }

    // 동성 풀을 미사용 페어로 완전 분할 (MRV + 백트래킹)
    function pairUpSame(pool) {
      if (pool.length === 0) return [];
      const avgSum = (2 * pool.reduce((a, p) => a + p.score, 0)) / pool.length;
      return recPair(pool, avgSum);
    }

    function recPair(remaining, avgSum) {
      if (remaining.length === 0) return [];
      let best = null;
      for (const p of remaining) {
        const cands = remaining.filter(
          (q) => q !== p && (allowPartnerRepeat || !partnersUsed.has(pairKey(p.id, q.id)))
        );
        if (cands.length === 0) return null;
        if (!best || cands.length < best.cands.length) best = { p, cands };
      }
      const { p, cands } = best;
      const ordered = cands
        .map((q) => ({ q, s: partnerOrderScore(p, q, avgSum) }))
        .sort((a, b) => a.s - b.s)
        .map((o) => o.q);
      for (const q of ordered) {
        const rest = remaining.filter((x) => x !== p && x !== q);
        const res = recPair(rest, avgSum);
        if (res) return [[p, q], ...res];
      }
      return null;
    }

    // 혼복 페어: 남↔여 이분 매칭 (MRV + 백트래킹)
    function pairUpMixed(menPool, womenPool) {
      if (menPool.length === 0) return [];
      const all = [...menPool, ...womenPool];
      const avgSum = (2 * all.reduce((a, p) => a + p.score, 0)) / all.length;
      const rec = (menLeft, womenLeft) => {
        if (menLeft.length === 0) return [];
        let best = null;
        for (const p of menLeft) {
          const cands = womenLeft.filter(
            (q) => allowPartnerRepeat || !partnersUsed.has(pairKey(p.id, q.id))
          );
          if (cands.length === 0) return null;
          if (!best || cands.length < best.cands.length) best = { p, cands };
        }
        const { p, cands } = best;
        const ordered = cands
          .map((q) => ({ q, s: partnerOrderScore(p, q, avgSum) }))
          .sort((a, b) => a.s - b.s)
          .map((o) => o.q);
        for (const q of ordered) {
          const res = rec(
            menLeft.filter((x) => x !== p),
            womenLeft.filter((x) => x !== q)
          );
          if (res) return [[p, q], ...res];
        }
        return null;
      };
      return rec(menPool, womenPool);
    }

    // 파트너 후보 순서: 팀 합이 풀 평균에 가깝게(균형 밑작업), 신규회원은 강자와, 중복 허용 시 덜 쓴 조합부터
    function partnerOrderScore(p, q, avgSum) {
      let s = Math.abs(p.score + q.score - avgSum);
      if (allowPartnerRepeat) s += (partnersUsed.get(pairKey(p.id, q.id)) || 0) * 100;
      if (p.prefs.newMember || q.prefs.newMember) s += Math.min(p.score, q.score) * 0.8;
      s += rng.jitter(1.5);
      return s;
    }

    // 같은 유형 페어들을 2개씩 묶어 게임으로 — 상대 중복·점수차 최소 조합 선택
    function bestMatchup(pairs) {
      if (pairs.length === 0) return [];
      if (pairs.length % 2 !== 0) return null;
      const options = enumerateMatchings(pairs);
      let best = null;
      let bestCost = Infinity;
      for (const opt of options) {
        let cost = rng.jitter(0.5);
        for (const [A, B] of opt) {
          let meetPen = 0;
          for (const x of A) for (const y of B) {
            const met = meets.get(pairKey(x.id, y.id)) || 0;
            meetPen += met;
            if (maxMeet != null && met >= maxMeet) cost += 500; // 이 게임으로 상대 상한 초과 → 사실상 배제
          }
          const sum = (t) => t[0].score + t[1].score;
          const diff = Math.abs(sum(A) - sum(B));
          cost += meetPen * 10 + diff;
          if (maxDiff != null && diff > maxDiff) cost += 500 * (diff - maxDiff); // 점수차 상한 위반은 사실상 배제
          const four = [...A, ...B];
          if (four.some((p) => p.prefs.newMember)) cost += Math.min(...four.map((p) => p.score)) * 0.3;
        }
        if (cost < bestCost) {
          bestCost = cost;
          best = opt;
        }
      }
      return best;
    }

    function enumerateMatchings(pairs) {
      if (pairs.length === 0) return [[]];
      const [first, ...rest] = pairs;
      const out = [];
      for (let i = 0; i < rest.length; i++) {
        const partner = rest[i];
        const remaining = rest.filter((_, j) => j !== i);
        for (const sub of enumerateMatchings(remaining)) {
          out.push([[first, partner], ...sub]);
        }
      }
      return out;
    }
  }

  return { type: plan.type, rounds };
}

// ─── engine/optimize.js ───
// Phase C: 사전식(lexicographic) 비용 튜플 + 하드 제약 보존형 이웃 연산으로 로컬 서치.


// 우선순위 순서 그대로의 비용 튜플 — 앞 요소부터 비교하므로 가중치 역전이 없다.
function costOf(schedule, plan) {
  const st = computeStats(schedule, plan);
  return [
    st.structural.length * 10 + st.partnerRepeats, // 하드 (항상 0이어야 함)
    st.consecutiveSits * 2 + st.spreadPenalty * 2, // 준하드: 연속 결장 + 게임 수 편차
    st.diffCapViolations + st.meetCapViolations, // 점수차·같은 상대 상한(설정) 위반 — 준하드보다는 낮게
    st.rotationMiss + st.newMemberLessonMiss, // 레슨 로테이션(정기)
    st.mixedUncovered, // 월례 인당 혼복 1회
    st.earlyTightness, // 초반 빡겜: 같은 게임 4인의 실력 폭 최소화
    // 상대 중복(5순위)과 점수 균형(6순위)은 인접 계층이라 가중 합산으로 묶는다.
    // 사전식으로 완전 분리하면 재대면 1회를 피하려고 점수차 7짜리 게임을 만드는 왜곡이 생긴다.
    st.opponentPenalty * 8 + st.scoreDiffSq,
    st.traitPenalty, // 개인 특성 매칭
    st.typePrefCost, // 라운드별 유형 선호
    st.lessonSkillSpread, // 레슨 그룹 실력 유사성
  ];
}

function cmpCost(a, b) {
  for (let i = 0; i < a.length; i++) {
    if (a[i] < b[i]) return -1;
    if (a[i] > b[i]) return 1;
  }
  return 0;
}

function listSlots(rd) {
  const slots = [];
  rd.games.forEach((g, gi) => {
    g.teams.forEach((team, ti) => {
      team.forEach((id, si) => {
        slots.push({ kind: 'game', gi, ti, id, set: (v) => (g.teams[ti][si] = v) });
      });
    });
  });
  rd.lesson.forEach((id, li) => {
    slots.push({ kind: 'lesson', li, id, set: (v) => (rd.lesson[li] = v) });
  });
  return slots;
}

// 같은 성별끼리만 교환하므로 게임 유형(남복/여복/혼복)이 항상 보존된다.
function proposeMove(schedule, plan, rng) {
  const R = schedule.rounds.length;
  if (rng.next() < 0.88) {
    const r = rng.int(R);
    const rd = schedule.rounds[r];
    const slots = listSlots(rd);
    if (slots.length < 2) return null;
    const s1 = rng.pick(slots);
    const g1 = plan.byId.get(s1.id).gender;
    const cands = slots.filter((s2) => {
      if (s2 === s1) return false;
      if (plan.byId.get(s2.id).gender !== g1) return false;
      if (s1.kind === 'lesson' && s2.kind === 'lesson') return false; // 무의미
      if (s1.kind === 'game' && s2.kind === 'game' && s1.gi === s2.gi && s1.ti === s2.ti) return false; // 같은 팀
      return true;
    });
    if (!cands.length) return null;
    const s2 = rng.pick(cands);
    const id1 = s1.id;
    const id2 = s2.id;
    return {
      apply() {
        s1.set(id2);
        s2.set(id1);
      },
      revert() {
        s1.set(id1);
        s2.set(id2);
      },
    };
  }
  // 라운드 순서 교환 — 연속 결장 패턴·유형 선호(짝수 라운드 혼복) 개선용.
  // 제외 인원이나 코트 수가 다른 라운드끼리 바꾸면 하드 제약이 깨지므로 동일할 때만 허용.
  if (R < 2) return null;
  const r1 = rng.int(R);
  let r2 = rng.int(R);
  if (r1 === r2) r2 = (r2 + 1) % R;
  const a = schedule.rounds[r1];
  const b = schedule.rounds[r2];
  const sameExcluded =
    a.excluded.length === b.excluded.length && a.excluded.every((id) => b.excluded.includes(id));
  if (!sameExcluded || a.games.length !== b.games.length) return null;
  return {
    apply() {
      const t = schedule.rounds[r1];
      schedule.rounds[r1] = schedule.rounds[r2];
      schedule.rounds[r2] = t;
    },
    revert() {
      const t = schedule.rounds[r1];
      schedule.rounds[r1] = schedule.rounds[r2];
      schedule.rounds[r2] = t;
    },
  };
}

function hillClimb(schedule, plan, rng, iters) {
  let bestCost = costOf(schedule, plan);
  for (let i = 0; i < iters; i++) {
    const move = proposeMove(schedule, plan, rng);
    if (!move) continue;
    move.apply();
    const c = costOf(schedule, plan);
    const cmp = cmpCost(c, bestCost);
    if (cmp < 0 || (cmp === 0 && rng.next() < 0.35)) {
      bestCost = c;
    } else {
      move.revert();
    }
  }
  return bestCost;
}

// ─── engine/scheduler.js ───
// 공개 API: generateSchedule(config)
// config = {
//   type: 'regular' | 'monthly',            // 정기모임(2게임코트+레슨) | 월례대회(3게임코트)
//   rounds: 5,                              // 정기: 총 라운드 수
//   gamesPerPerson: 4,                      // 월례: 인당 게임 수
//   players: [{ id, name, gender:'M'|'W', score(성별 내 실력 순위, 1=최강),
//               prefs?:{gamePriority,newMember,mixedPreferred}, unavailableRounds?:[1-based] }],
//   options?: { maxDiff, tightRounds, allowConsecutiveSit, allowPartnerRepeat, ignoreGender },
//   seed?: number,
//   searchBudget?: { restarts, iters, polish } // 탐색 강도 (테스트용 축소 가능)
// }






function generateSchedule(config) {
  const plan = buildPlan(config);
  const seed = Number.isFinite(config.seed) ? config.seed >>> 0 : 20260718;
  const rng = makeRng(seed || 1);
  const budget = Object.assign({ restarts: 24, iters: 500, polish: 1500 }, config.searchBudget || {});

  // 완화 사다리: 엄격 → 연속 결장 허용 → 파트너 중복 최소화. 앞 단계가 전멸했을 때만 다음 단계로.
  // 설정에서 강제로 허용한 항목은 첫 단계부터 켠 채 시작한다.
  const base = {};
  const baseRelax = [];
  if (plan.options.allowConsecutiveSit) {
    base.allowConsecutiveSit = true;
    baseRelax.push('연속 결장(레슨/대기)이 설정에 의해 허용되었습니다.');
  }
  if (plan.options.allowPartnerRepeat) {
    base.allowPartnerRepeat = true;
    baseRelax.push('파트너 중복이 설정에 의해 허용되었습니다 (중복 최소화로 배정).');
  }
  const stages = [{ opts: { ...base }, relaxations: [...baseRelax] }];
  if (!base.allowConsecutiveSit) {
    stages.push({
      opts: { ...base, allowConsecutiveSit: true },
      relaxations: [...baseRelax, '연속 결장(레슨/대기) 금지를 완화했습니다. 연속 결장을 최소화하는 방향으로 배정합니다.'],
    });
  }
  if (!base.allowPartnerRepeat) {
    stages.push({
      opts: { allowConsecutiveSit: true, allowPartnerRepeat: true },
      relaxations: [
        ...baseRelax,
        '연속 결장(레슨/대기) 금지를 완화했습니다.',
        '파트너 중복 0회 제약을 지킬 수 없어 "중복 최소화"로 완화했습니다.',
      ],
    });
  }

  let best = null;
  let bestCost = null;
  let usedStage = null;
  for (const stage of stages) {
    for (let i = 0; i < budget.restarts; i++) {
      const s = constructSchedule(plan, rng, stage.opts);
      if (!s) continue;
      hillClimb(s, plan, rng, budget.iters);
      const c = costOf(s, plan);
      if (!best || cmpCost(c, bestCost) < 0) {
        best = s;
        bestCost = c;
      }
    }
    if (best) {
      usedStage = stage;
      break;
    }
  }

  if (!best) {
    throw new SchedulerError('대진표를 구성하지 못했습니다. 인원 구성이나 라운드 설정을 조정해 다시 시도해주세요.');
  }

  hillClimb(best, plan, rng, budget.polish);

  const { errors, warnings, stats } = validateSchedule(best, plan);
  return {
    type: plan.type,
    rounds: best.rounds,
    seed,
    plan,
    errors,
    warnings: [...plan.planWarnings, ...warnings],
    stats,
    relaxationsApplied: usedStage.relaxations,
  };
}

// ─── 공유 링크: 압축 + 관리자 비밀번호 암호화 ───
// 대진표(라운드+참가자 이름)는 평문으로 담아 누구나 볼 수 있고,
// 명단·설정·재생성용 구성은 AES-GCM으로 잠가 비밀번호를 아는 사람만 복원한다.
const te = new TextEncoder();
const td = new TextDecoder();

function b64uEncode(bytes) {
  let s = '';
  bytes.forEach((b) => (s += String.fromCharCode(b)));
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64uDecode(str) {
  const s = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(s, (c) => c.charCodeAt(0));
}
async function compressBytes(bytes) {
  if (typeof CompressionStream === 'undefined') return { c: 0, bytes };
  const stream = new Blob([bytes]).stream().pipeThrough(new CompressionStream('deflate-raw'));
  return { c: 1, bytes: new Uint8Array(await new Response(stream).arrayBuffer()) };
}
async function decompressBytes(bytes, c) {
  if (!c) return bytes;
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function digestOfPassword(pw) {
  return new Uint8Array(await crypto.subtle.digest('SHA-256', te.encode('angry-v2:' + pw)));
}
async function keyFromDigest(digB64) {
  return crypto.subtle.importKey('raw', b64uDecode(digB64), 'AES-GCM', false, ['encrypt', 'decrypt']);
}
async function encryptJson(obj, digB64) {
  const key = await keyFromDigest(digB64);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  // 암호문은 압축이 안 되므로 평문을 먼저 압축한 뒤 암호화한다 (링크 길이 절감)
  const { c, bytes } = await compressBytes(te.encode(JSON.stringify(obj)));
  const data = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, bytes));
  return { i: b64uEncode(iv), d: b64uEncode(data), c };
}
async function decryptJson(e, digB64) {
  const key = await keyFromDigest(digB64);
  const plain = new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64uDecode(e.i) }, key, b64uDecode(e.d)));
  return JSON.parse(td.decode(await decompressBytes(plain, e.c)));
}

async function makeShareLink(kind) {
  if (!window.isSecureContext || !crypto.subtle) {
    toast('이 환경에서는 공유 링크 암호화를 사용할 수 없습니다.');
    return null;
  }
  const dig = localStorage.getItem(K_KEY);
  if (!dig) {
    toast('먼저 고급 설정에서 관리자 비밀번호를 설정하세요.');
    state.ui.adv = true;
    render();
    return null;
  }
  const secret = { roster: state.roster, settings: state.settings };
  const payload = { v: 1, k: kind === 'bracket' ? 'b' : 'r', date: new Date().toLocaleDateString('ko-KR') };
  if (kind === 'bracket') {
    const entry = state.history[state.currentIdx];
    if (!entry || !state.result || state.result.fatal) {
      toast('먼저 대진표를 생성하세요.');
      return null;
    }
    const names = {};
    entry.config.players.forEach((p) => (names[p.id] = [p.name, p.gender]));
    payload.b = { type: entry.config.type, rounds: state.result.rounds, names };
    secret.config = entry.config;
    secret.seed = entry.seed;
  }
  payload.e = await encryptJson(secret, dig);
  const { c, bytes } = await compressBytes(te.encode(JSON.stringify(payload)));
  const base = location.protocol === 'file:' ? PUBLIC_URL : location.href.split('#')[0];
  const link = `${base}#d=${c}${b64uEncode(bytes)}`;
  const finalLink = await shortenLink(link);
  window.__lastShareLink = finalLink;
  const label = kind === 'bracket' ? '대진표 공유 링크' : '명단 공유 링크';
  try {
    await navigator.clipboard.writeText(finalLink);
    toast(`${label}가 복사되었습니다${finalLink === link ? ' (단축 실패 — 긴 주소로 복사됨)' : ''}. 카톡에 붙여넣으세요!`);
  } catch (e) {
    prompt('아래 링크를 복사하세요:', finalLink);
  }
  return finalLink;
}

// TinyURL로 단축 (실패 시 원본 링크 그대로 사용) — 명단·설정은 암호화된 채로 담겨 있어 경유해도 안전
async function shortenLink(link) {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    const resp = await fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(link), { signal: ctrl.signal });
    clearTimeout(timer);
    if (resp.ok) {
      const short = (await resp.text()).trim();
      if (/^https:\/\/tinyurl\.com\/[\w-]+$/.test(short)) return short;
    }
  } catch (e) { /* 오프라인·차단 — 원본 사용 */ }
  return link;
}

// 공유 데이터(복호화된 명단·설정·대진표 구성)를 내 기기에 저장
function importShared(dec, payload) {
  if (dec.roster) state.roster = dec.roster;
  if (dec.settings) state.settings = Object.assign({}, state.settings, dec.settings);
  state.attend.selectedIds = state.attend.selectedIds.filter((id) => memberOf(id));
  if (dec.config && payload.b) {
    const exists = state.history.some((h) => h.seed === dec.seed && JSON.stringify(h.rounds) === JSON.stringify(payload.b.rounds));
    if (!exists) {
      state.history.unshift({
        ts: payload.date || '공유됨',
        seed: dec.seed,
        config: dec.config,
        rounds: deepClone(payload.b.rounds),
        edited: false,
        summary: { avgDiff: '-', maxMeet: '-', partnerRepeats: '-' },
      });
      if (state.history.length > 10) state.history.length = 10;
    }
  }
  persistAll();
}

async function handleShareHash() {
  const m = location.hash.match(/^#d=([01])([A-Za-z0-9_-]+)$/);
  if (!m) return;
  try {
    const bytes = await decompressBytes(b64uDecode(m[2]), +m[1]);
    const payload = JSON.parse(td.decode(bytes));
    history.replaceState(null, '', location.pathname + location.search);
    state.share = payload;
    state.viewerMode = payload.k === 'b' ? 'b' : 'r';
    const dig = localStorage.getItem(K_KEY);
    if (dig) {
      try {
        const dec = await decryptJson(payload.e, dig);
        importShared(dec, payload);
        state.shareUnlocked = true;
        if (payload.k === 'r') {
          state.viewerMode = false;
          state.share = null;
          setTimeout(() => toast('공유받은 명단·설정을 불러왔습니다.'), 300);
        }
      } catch (e) { /* 키가 달라 해독 실패 — 뷰어로만 표시 */ }
    }
  } catch (e) {
    setTimeout(() => toast('공유 링크를 읽을 수 없습니다.'), 300);
  }
}

async function tryUnlock(pw) {
  if (!pw) return;
  try {
    const dig = b64uEncode(await digestOfPassword(pw));
    const dec = await decryptJson(state.share.e, dig);
    localStorage.setItem(K_KEY, dig);
    importShared(dec, state.share);
    state.viewerMode = false;
    state.share = null;
    state.shareUnlocked = false;
    render();
    toast('관리자 모드로 전환되었습니다. 명단·설정을 불러왔습니다.');
  } catch (e) {
    toast('비밀번호가 올바르지 않습니다.');
  }
}

function estimatedRounds() {
  const s = state.settings;
  if (s.meetingType === 'regular') return Math.max(1, Math.min(12, s.rounds));
  const N = state.attend.selectedIds.length || 12;
  const T = Math.ceil((N * s.gamesPerPerson) / 4);
  return Math.ceil(T / (N >= 12 ? 3 : N >= 8 ? 2 : 1));
}

function effectiveExclude(id) {
  if (state.attend.excludeOverrides[id]) return state.attend.excludeOverrides[id];
  const m = memberOf(id);
  return m && m.presetExclude ? m.presetExclude : [];
}
